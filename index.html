        font-weight: bold;
        color: var(--nojima-blue);
    }

        display: block;
        font-size: 0.78em;
        font-weight: normal;
        color: var(--text-muted);
        margin-top: 3px;
    }
    /* POS売価（保証5%計算用）：小さめ表示（読みやすさは維持） */

        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-top: 2px;
    }
    .pre-discount label {
        font-size: 0.8em;
        font-weight: bold;
        color: var(--text-muted);
    }

        font-size: 14px;
        max-width: none;
    }

        --plan-accent-strong: #1e6d3c;

        --plan-soft-strong: #e1f1e6;
        --plan-border: #b8d9c3;
    }
    .plan-card:nth-child(2) {

        font-size: 0.5em;
        font-weight: normal;
        color: var(--text-muted);
        margin-top: 5px;

        background: var(--plan-soft);
        border: 1px solid var(--plan-border);
        border-radius: 6px;

        margin-right: 4px;

    .surcharge-note { font-size: 0.78em; color: #d32f2f; font-weight: bold; min-height: 1em; }

    .result-item {

        .container::-webkit-scrollbar {

            width: 100%;
        }
    }
</style>

            name: "洗濯機", leaflet: "sentakuki-leaflet.jpeg", repair: "sentakuki-repair.jpeg",
            plans: {
                light:    { items: ["①自然故障"], perks: [] },
                standard: { items: ["①自然故障", "②初期不良新品交換（1年対応）", "③ドラム洗満足保証（2週間以内）", "④雷保証（10年）"], perks: ["洗濯槽クリーナークーポン", "ノジマポイントプレゼント"] },
                premium:  { items: ["①自然故障", "②物損保証（自然故障と同等年数）", "③初期不良新品交換（1年対応）", "④ドラム洗満足保証（2週間以内）", "⑤雷保証（10年）"], perks: ["保証未使用時特典", "洗濯槽クリーナークーポン", "ノジマポイントプレゼント"] }
            }
        }
    };

    // 家電の3プラン枠（ライト＝保証のみ／スタンダード＝保証＋サポート(2000P)／プレミアム＝保証プラス＋サポート(3000P)）
    const APPLIANCE_PLAN_DEFS = [
        { key: "light",    title: "ライトプラン",       sub: "～必要な内容をシンプルに～",             warrantyLabel: "プレミアム安心保証",       points: 0 },
        { key: "standard", title: "スタンダードプラン", sub: "～価格と内容のバランスNo.1～",           warrantyLabel: "プレミアム安心保証",       points: 2000 },
        { key: "premium",  title: "プレミアムプラン",   sub: "～すべてを網羅した充実のフルサポート～", warrantyLabel: "プレミアム安心保証プラス", points: 3000 }
    ];
    // 商品ごとの設定（保証5%加算の閾値：PC=22万、家電=11万）
    const PRODUCT_META = {
        pc:        { name: "パソコン", type: "pc",        threshold: 220000 },
        aircon:    { name: "エアコン", type: "appliance", threshold: 110000 },
        tv:        { name: "テレビ",   type: "appliance", threshold: 110000 },
        reizoko:   { name: "冷蔵庫",   type: "appliance", threshold: 110000 },
        sentakuki: { name: "洗濯機",   type: "appliance", threshold: 110000 }
    };

    let currentProduct = "pc";

    function formatCurrency(num) {
        return num.toLocaleString() + "円";
    }

    function formatThreshold(threshold) {
        return `${(threshold / 10000).toLocaleString()}万円`;
    }

    function posPriceLabel(meta) {
        return `POS売価(各種　値引施策適用前) ※保証5%計算用・税込${formatThreshold(meta.threshold)}以上で加算`;
    }

    function applianceWarrantyInfo(base, def) {
        if (base <= 0) {
            return { amount: 0, label: "POS売価を入力すると自動計算されます", note: "" };
        }

        const threshold = PRODUCT_META[currentProduct].threshold;
        const isPremium = def.key === "premium";
        const fixed = isPremium ? 11000 : 5500;
        const rate = isPremium ? 0.10 : 0.05;
        const rateText = isPremium ? "10%" : "5%";

        if (base >= threshold) {
            const amount = Math.floor(base * rate);
            return {
                amount,
                label: formatCurrency(amount),
                note: `<div class="description-item"><span class="description-label">【保証加算】</span>POS売価が税込${formatThreshold(threshold)}以上のためPOS売価の${rateText}（${amount.toLocaleString()}円）で計算 → 保証料 ${amount.toLocaleString()}円</div>`
            };
        }

        return {
            amount: fixed,
            label: formatCurrency(fixed),
            note: `<div class="description-item"><span class="description-label">【保証加算】</span>POS売価が税込${formatThreshold(threshold)}未満のため保証料 ${fixed.toLocaleString()}円</div>`
        };
    }

    function markManualWarranty(index) {
        const input = document.getElementById(`warranty_${index}`);
        if (input) input.dataset.manual = "true";
    }

    function autoFillApplianceWarranty(index, force = false) {
        if (PRODUCT_META[currentProduct].type !== 'appliance') return null;

        const base = parseInt(document.getElementById('preDiscountPrice').value) || 0;
        const def = APPLIANCE_PLAN_DEFS[index - 1];
        const warrantyInfo = applianceWarrantyInfo(base, def);
        const input = document.getElementById(`warranty_${index}`);
        const amountLabel = document.getElementById(`warrantyAmount_${index}`);

        if (!input) return warrantyInfo;
        if (force || input.dataset.manual !== "true") {
            input.value = warrantyInfo.amount > 0 ? warrantyInfo.amount : "";
            input.dataset.manual = "false";
        }
        input.dataset.autoValue = String(warrantyInfo.amount);

        if (amountLabel) {
            amountLabel.textContent = warrantyInfo.amount > 0
                ? `自動計算: ${warrantyInfo.label}`
                : warrantyInfo.label;
        }

        return warrantyInfo;
    }

    // ============ 計算：ディスパッチ ============
    function calculate(index) {
        if (PRODUCT_META[currentProduct].type === 'pc') {
            calcPc(index);
        } else {
            calcAppliance(index);
        }
    }

    // ============ パソコンの計算（既存ロジックを維持） ============
    function calcPc(index) {
        const pcPrice = parseInt(document.getElementById(`pcPrice_${index}`).value) || 0;

        const warrantySelect = document.getElementById(`warranty_${index}`);
        let warrantyVal = parseInt(warrantySelect.value) || 0;
        const warrantyType = warrantySelect.options[warrantySelect.selectedIndex].dataset.type;
        const warrantyText = warrantySelect.options[warrantySelect.selectedIndex].text;

        // POS売価（税込）が22万円以上のとき、保証料にPOS売価の5%を加算
        const preBase = parseInt(document.getElementById('preDiscountPrice').value) || 0;
        let warrantySurcharge = 0;
        if (warrantyVal > 0 && preBase >= PRODUCT_META.pc.threshold) {
            warrantySurcharge = Math.floor(preBase * 0.05);
            warrantyVal += warrantySurcharge;
        }

        const supportSelect = document.getElementById(`support_${index}`);
        const supportVal = parseInt(supportSelect.value) || 0;
        const supportText = supportSelect.options[supportSelect.selectedIndex].text;

        const settingSelect = document.getElementById(`setting_${index}`);
        const settingVal = parseInt(settingSelect.value) || 0;
        const settingText = settingSelect.options[settingSelect.selectedIndex].text;

        const dataRecSelect = document.getElementById(`dataRecovery_${index}`);
        const dataRecVal = parseInt(dataRecSelect.value) || 0;

        const avSelect = document.getElementById(`antivirus_${index}`);
        const avVal = parseInt(avSelect.value) || 0;

        const s4Group = document.getElementById(`s4Group_${index}`);
        const s4Select = document.getElementById(`s4Discount_${index}`);
        let s4Val = 0;
        if (supportVal > 0 && settingText.includes("(会員様)")) {
            s4Group.style.display = "flex";
            const discountRaw = parseInt(s4Select.value) || 0;
            s4Val = discountRaw > 0 ? -discountRaw : discountRaw;
        } else {
            s4Group.style.display = "none";
            s4Select.value = "";
            s4Val = 0;
        }

        const optionTotal = warrantyVal + supportVal + settingVal + dataRecVal + avVal + s4Val;
        const grandTotal = pcPrice + optionTotal;

        let points = 0;
        if (supportVal > 0) {
            if (warrantyType === "premium") points = 2000;
            else if (warrantyType === "plus") points = 3000;
        }

        const hasPre = preBase > 0;
        document.getElementById(`resultMissing_${index}`).style.display = hasPre ? "none" : "block";
        document.getElementById(`resultRows_${index}`).style.display = hasPre ? "block" : "none";
        const optionTotalEl = document.getElementById(`optionTotal_${index}`);
        if (optionTotalEl) optionTotalEl.innerText = formatCurrency(optionTotal);
        document.getElementById(`grandTotal_${index}`).innerText = formatCurrency(grandTotal);

        const pointEl = document.getElementById(`points_${index}`);
        if (points > 0 && hasPre) {
            pointEl.innerText = `プレゼント ${points.toLocaleString()} ポイント付与対象！`;
            pointEl.style.display = "block";
        } else {
            pointEl.style.display = "none";
        }

        let descHtml = "";
        if (warrantyText.includes("システム保証")) {
            descHtml += `<div class="description-item"><span class="description-label">【保証】</span>自然・物損・水濡れ保証 ＋ システムプログラム関係</div>`;
        } else if (warrantyText.includes("プラス")) {
            descHtml += `<div class="description-item"><span class="description-label">【保証】</span>自然・物損・水濡れ保証</div>`;
        } else if (warrantyText.includes("プレミアム安心保証")) {
            descHtml += `<div class="description-item"><span class="description-label">【保証】</span>自然故障</div>`;
        }
        const surchargeNote = document.getElementById(`surchargeNote_${index}`);
        surchargeNote.innerHTML = warrantySurcharge > 0
            ? `<div class="description-item"><span class="description-label">【保証加算】</span>POS売価が税込${formatThreshold(PRODUCT_META.pc.threshold)}以上のためPOS売価の5%（+${warrantySurcharge.toLocaleString()}円）を加算 → 保証料 ${warrantyVal.toLocaleString()}円</div>`
            : "";
        if (supportText.includes("ワイド")) {
            descHtml += `<div class="description-item"><span class="description-label">【ｻﾎﾟｰﾄ】</span>電話相談（9：30～21：00）・遠隔操作・店頭調子見無料・設定料金２割引</div>`;
        } else if (supportText.includes("ライト")) {
            descHtml += `<div class="description-item"><span class="description-label">【ｻﾎﾟｰﾄ】</span>電話相談（9：30～19：00）・遠隔操作・店頭調子見無料・設定料金２割引</div>`;
        }
        if (settingText.includes("データ移行パック")) {
            descHtml += `<div class="description-item"><span class="description-label">【設定】</span>初期設定・office設定・ウイルス対策設定・データ移行（100GB迄）</div>`;
        } else if (settingText.includes("スタートパックプラス")) {
            descHtml += `<div class="description-item"><span class="description-label">【設定】</span>初期設定・office設定・ウイルス対策設定（ソフト代別料金）・メール設定・Windows＆メーカーアップデート</div>`;
        } else if (settingText.includes("スタートパック")) {
            descHtml += `<div class="description-item"><span class="description-label">【設定】</span>初期設定・office設定・ウイルス対策設定（ソフト代別料金）</div>`;
        }
        const descBox = document.getElementById(`descBox_${index}`);
        if (descHtml !== "") {
            descBox.innerHTML = descHtml;
            descBox.style.display = "block";
        } else {
            descBox.style.display = "none";
        }
    }

    // ============ 家電の計算 ============
    function calcAppliance(index) {
        const base = parseInt(document.getElementById('preDiscountPrice').value) || 0; // POS売価（各種値引施策適用前・税込）
        const pcPrice = parseInt(document.getElementById(`pcPrice_${index}`).value) || 0;  // 値引き後（支払いベース）

        const def = APPLIANCE_PLAN_DEFS[index - 1];
        const warrantyInfo = autoFillApplianceWarranty(index) || applianceWarrantyInfo(base, def);
        const warrantyInput = document.getElementById(`warranty_${index}`);
        const warranty = parseInt(warrantyInput.value) || 0;
        const usesManualWarranty = warrantyInput.dataset.manual === "true" && warranty !== warrantyInfo.amount;

        const support = parseInt(document.getElementById(`support_${index}`).value) || 0;
        const discountRaw = parseInt(document.getElementById(`s4Discount_${index}`).value) || 0;
        const sdisc = discountRaw > 0 ? -discountRaw : discountRaw;

        const note = document.getElementById(`surchargeNote_${index}`);
        if (note) {
            note.innerHTML = usesManualWarranty
                ? `<div class="description-item"><span class="description-label">【保証加算】</span>手入力の保証料 ${warranty.toLocaleString()}円で計算（自動計算目安 ${warrantyInfo.label}）</div>`
                : warrantyInfo.note;
        }

        const optionTotal = warranty + support + sdisc;
        const grandTotal = pcPrice + optionTotal;

        let points = 0;
        if (def.points > 0 && warranty > 0 && support > 0) points = def.points;

        const hasBase = base > 0;
        document.getElementById(`resultMissing_${index}`).style.display = hasBase ? "none" : "block";
        document.getElementById(`resultRows_${index}`).style.display = hasBase ? "block" : "none";
        const optionTotalEl = document.getElementById(`optionTotal_${index}`);
        if (optionTotalEl) optionTotalEl.innerText = formatCurrency(optionTotal);
        document.getElementById(`grandTotal_${index}`).innerText = formatCurrency(grandTotal);

        const pointEl = document.getElementById(`points_${index}`);
        if (points > 0 && hasBase) {
            pointEl.innerText = `プレゼント ${points.toLocaleString()} ポイント付与対象！`;
            pointEl.style.display = "block";
        } else {
            pointEl.style.display = "none";
        }
    }

    // ============ カード生成：ディスパッチ ============
    const app = document.getElementById('app');

    function buildCards() {
        app.innerHTML = "";
        if (PRODUCT_META[currentProduct].type === 'pc') {
            buildPcCards();
        } else {
            buildApplianceCards();
        }
        for (let i = 1; i <= planCount; i++) calculate(i);
    }

    function buildPcCards() {
        for (let i = 1; i <= planCount; i++) {
            const card = document.createElement('div');
            card.className = 'plan-card';
            let html = `<div class="plan-title">${planTitles[i - 1]}</div>`;

            html += `
                <div class="form-group">
                    <label>★パソコン本体価格 (手入力)</label>
                    <input type="number" id="pcPrice_${i}" placeholder="例: 100000" oninput="calculate(${i})">
                </div>`;

            html += `<div class="form-group"><label>★延長保証</label><select id="warranty_${i}" onchange="calculate(${i})">`;
            warranties.forEach(w => { html += `<option value="${w.value}" data-type="${w.type}">${w.name}</option>`; });
            html += `</select><div class="surcharge-note" id="surchargeNote_${i}"></div></div>`;

            html += `
                <div class="form-group">
                    <label style="display: flex; justify-content: space-between; align-items: center;">
                        ★PCサポート
                        <div class="button-group">
                            <a href="sapo1.jpeg" target="_blank" class="image-link-btn">クリップ PCサポートライト</a>
                            <a href="sapo2.jpeg" target="_blank" class="image-link-btn">クリップ PCサポートワイド</a>
                        </div>
                    </label>
                    <select id="support_${i}" onchange="calculate(${i})">`;
            supports.forEach(s => { html += `<option value="${s.value}">${s.name}</option>`; });
            html += `</select></div>`;

            html += `<div class="form-group"><label>★セッティング</label><select id="setting_${i}" onchange="calculate(${i})">`;
            settings.forEach(s => { html += `<option value="${s.value}">${s.name}</option>`; });
            html += `</select></div>`;

            html += `<div class="form-group" id="s4Group_${i}" style="display:none;">
                        <label class="discount-label">★サポート値引</label>
                        <input type="number" id="s4Discount_${i}" placeholder="必要時のみ入力" inputmode="numeric" oninput="calculate(${i})">
                    </div>`;

            html += `<div class="form-group"><label>★データ復旧補償</label><select id="dataRecovery_${i}" onchange="calculate(${i})">`;
            dataRecoveries.forEach(d => { html += `<option value="${d.value}">${d.name}</option>`; });
            html += `</select></div>`;

            html += `
                <div class="form-group">
                    <label style="display: flex; justify-content: space-between; align-items: center;">
                        ★ウイルス対策ソフト
                        <a href="uirusu.jpeg" target="_blank" class="image-link-btn">クリップ ウイルス対策ソフト</a>
                    </label>
                    <select id="antivirus_${i}" onchange="calculate(${i})">`;
            antiviruses.forEach(a => { html += `<option value="${a.value}">${a.name}</option>`; });
            html += `</select></div>`;

            html += `<div class="description-box" id="descBox_${i}"></div>`;
            html += resultBoxHtml(i);

            card.innerHTML = html;
            app.appendChild(card);
        }
    }

    function buildApplianceCards() {
        const p = APPLIANCES[currentProduct];
        APPLIANCE_PLAN_DEFS.forEach((def, idx) => {
            const i = idx + 1;
            const plan = p.plans[def.key];
            const card = document.createElement('div');
            card.className = 'plan-card';

            let contents = plan.items.map(t => `<li>${t}</li>`).join("");
            if (plan.perks.length) {
                contents += `<li class="perk-head">さらに</li>` + plan.perks.map(t => `<li class="perk">・${t}</li>`).join("");
            }

            let html = `<div class="plan-title">${def.title}<span class="plan-subtitle">${def.sub}</span></div>`;
            html += `<ul class="plan-contents">${contents}</ul>`;

            // 値引き後（この商品の支払いベース）— 共通バーから自動反映。手修正も可
            html += `
                <div class="form-group">
                    <label>★本体価格 (値引き後・手入力可)</label>
                    <input type="number" id="pcPrice_${i}" placeholder="例: 100000" oninput="calculate(${i})">
                </div>`;

            html += `
                <div class="form-group">
                    <label style="display:flex; justify-content:space-between; align-items:center;">
                        ★延長保証（${def.warrantyLabel}）
                        <a href="${p.repair}" target="_blank" class="image-link-btn">クリップ 故障例・修理金額</a>
                    </label>
                    <input type="number" id="warranty_${i}" placeholder="POS売価から自動入力" inputmode="numeric" oninput="markManualWarranty(${i}); calculate(${i})">
                    <div class="surcharge-note" id="warrantyAmount_${i}">POS売価を入力すると自動計算されます</div>
                    <div class="surcharge-note" id="surchargeNote_${i}"></div>
                </div>`;

            const supportValue = currentProduct === "aircon" ? 14300 : "";
            const supportPlaceholder = currentProduct === "aircon" ? "" : "金額を入力（商品・単価で変動）";

            html += `
                <div class="form-group">
                    <label style="display:flex; justify-content:space-between; align-items:center;">
                        ★サポート
                        <a href="${p.leaflet}" target="_blank" class="image-link-btn">クリップ サポートリーフレット</a>
                    </label>
                    <input type="number" id="support_${i}" value="${supportValue}" placeholder="${supportPlaceholder}" inputmode="numeric" oninput="calculate(${i})">
                </div>`;

            html += `
                <div class="form-group">
                    <label class="discount-label">★サポート値引</label>
                    <input type="number" id="s4Discount_${i}" placeholder="必要時のみ入力" inputmode="numeric" oninput="calculate(${i})">
                </div>`;

            html += resultBoxHtml(i);
            card.innerHTML = html;
            app.appendChild(card);
        });
    }

    function resultBoxHtml(i) {
        return `
            <div class="result-box">
                <div class="result-missing" id="resultMissing_${i}">POS売価が入力されていません</div>
                <div class="result-rows" id="resultRows_${i}" style="display:none;">
                    <div class="result-total">
                        <span>総合計:</span>
                        <span id="grandTotal_${i}">0円</span>
                    </div>
                </div>
                <div class="point-badge" id="points_${i}" style="display:none;"></div>
            </div>`;
    }

    // ===== 共通の本体価格（値引き後）：税込入力を各プランへ反映 =====
    function applyMasterPrice() {
        const inclusive = parseInt(document.getElementById('masterPrice').value) || 0;
        for (let i = 1; i <= planCount; i++) {
            document.getElementById(`pcPrice_${i}`).value = inclusive > 0 ? inclusive : '';
            calculate(i);
        }
    }

    // ===== 商品切り替え =====
    function switchProduct() {
        currentProduct = document.getElementById('productSelect').value;
        const meta = PRODUCT_META[currentProduct];
        // ラベル類の更新
        document.querySelectorAll('.product-name').forEach(el => el.textContent = meta.name);
        document.querySelector('.threshold-label').textContent = posPriceLabel(meta);
        buildCards();
        // 値引き後の共通額を反映し直す
        applyMasterPrice();
    }

    document.getElementById('masterPrice').addEventListener('input', applyMasterPrice);
    document.getElementById('preDiscountPrice').addEventListener('input', () => {
        for (let i = 1; i <= planCount; i++) {
            autoFillApplianceWarranty(i, true);
            calculate(i);
        }
    });

    // 初期表示（パソコン）
    buildCards();

    // ===== PWA：オフライン利用のためのサービスワーカー登録 =====
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then((registration) => registration.update())
                .catch(() => {});
        });
    }
</script>

</body>
</html>
